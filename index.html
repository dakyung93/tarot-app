<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ 별의 신탁 — 타로 리딩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#7a6030;
  --dark:#07050f;--surface:#110e20;--surface2:#1a1630;
  --text:#e8e0d0;--muted:#807090;--accent:#6b4fb5;
}
html,body{min-height:100vh;background:var(--dark);color:var(--text);}
body{font-family:'Noto Serif KR',serif;font-weight:300;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:var(--o1,.2);transform:scale(1)}50%{opacity:var(--o2,.8);transform:scale(1.3)}}
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:2rem 1.2rem 5rem;}
.hdr{text-align:center;margin-bottom:2rem;}
.hdr-ornament{font-size:1.1rem;color:var(--gold-dim);letter-spacing:0.5em;margin-bottom:0.5rem;}
h1{font-family:'Cinzel',serif;font-size:2rem;font-weight:400;color:var(--gold);letter-spacing:0.2em;margin-bottom:0.3rem;}
.hdr-sub{font-size:0.78rem;color:var(--muted);letter-spacing:0.15em;font-family:'Cinzel',serif;}

/* Free bar */
.free-bar{background:var(--surface);border:1px solid #2e2850;border-radius:12px;padding:0.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.pips{display:flex;gap:8px;align-items:center;}
.pip{width:11px;height:11px;border-radius:50%;border:1px solid var(--gold-dim);transition:all 0.4s;}
.pip.used{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(201,168,76,0.5);}
.pip.paid{background:#6b4fb5;border-color:#8b6fd5;box-shadow:0 0 8px rgba(107,79,181,0.5);}
.free-info{text-align:right;}
.free-count{font-family:'Cinzel',serif;font-size:0.72rem;color:var(--gold);letter-spacing:0.1em;}
.free-sub{font-size:0.65rem;color:var(--muted);margin-top:2px;}
.status-loading{font-size:0.7rem;color:var(--muted);font-style:italic;}

/* Input */
.input-card{background:var(--surface);border:1px solid #2e2850;border-radius:16px;padding:1.4rem;}
.field-label{font-family:'Cinzel',serif;font-size:0.7rem;color:var(--gold);letter-spacing:0.12em;margin-bottom:0.6rem;display:block;}
textarea{width:100%;background:#0c0918;border:1px solid #2e2850;border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Noto Serif KR',serif;font-size:0.95rem;font-weight:300;resize:none;height:72px;outline:none;transition:border 0.2s;line-height:1.6;}
textarea:focus{border-color:var(--accent);}
textarea::placeholder{color:#4a4060;}
.spread-label{font-family:'Cinzel',serif;font-size:0.65rem;color:var(--muted);letter-spacing:0.12em;margin:1rem 0 0.5rem;display:block;}
.spread-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem;}
.sopt{background:none;border:1px solid #2e2850;border-radius:20px;padding:6px 14px;color:var(--muted);font-family:'Cinzel',serif;font-size:0.65rem;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;}
.sopt:hover{border-color:var(--gold-dim);}
.sopt.active{border-color:var(--gold);color:var(--gold);background:#1e1838;}
.draw-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4a2d8e,#6b4fb5);border:none;border-radius:10px;color:var(--gold-light);font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:0.15em;cursor:pointer;transition:opacity 0.2s;}
.draw-btn:hover{opacity:0.88;}
.draw-btn:disabled{opacity:0.35;cursor:not-allowed;}

/* Cards */
.section-sep{text-align:center;font-family:'Cinzel',serif;font-size:0.6rem;color:var(--gold-dim);letter-spacing:0.2em;margin:2rem 0 1rem;}
.cards-area{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.card-slot{display:flex;flex-direction:column;align-items:center;}
.card-pos-label{font-family:'Cinzel',serif;font-size:0.55rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:6px;}
.card{width:105px;height:175px;cursor:pointer;perspective:700px;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(.4,0,.2,1);}
.card.flipped .card-inner{transform:rotateY(180deg);}
.card-back,.card-front{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:11px;}
.card-back{background:var(--surface2);border:1px solid #2e2850;display:flex;align-items:center;justify-content:center;}
.back-inner{width:72%;height:72%;border:1px solid #2e2850;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#2e2850;font-size:1.8rem;}
.card-front{background:linear-gradient(160deg,#161238,#1e1a3c);border:1px solid var(--gold);transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;padding:7px 5px;}
.suit-stripe{width:100%;height:3px;border-radius:2px;margin-bottom:6px;opacity:0.8;}
.c-name{font-family:'Cinzel',serif;font-size:0.48rem;color:var(--gold);letter-spacing:0.07em;text-align:center;line-height:1.4;min-height:22px;display:flex;align-items:center;justify-content:center;}
.c-sym{font-size:2.4rem;margin:2px 0;}
.c-type{font-size:0.52rem;font-style:italic;text-align:center;margin-bottom:3px;}
.c-key{font-size:0.52rem;color:var(--muted);text-align:center;font-style:italic;line-height:1.4;padding:0 2px;}
.c-rx{font-size:0.46rem;color:#d07050;font-family:'Cinzel',serif;letter-spacing:0.06em;margin-top:4px;}

/* Reading */
.reading-wrap{background:var(--surface);border:1px solid #2e2850;border-radius:16px;padding:1.6rem;margin-top:1rem;}
.reading-hdr{font-family:'Cinzel',serif;font-size:0.72rem;color:var(--gold);letter-spacing:0.15em;margin-bottom:1.2rem;text-align:center;}
.reading-body{font-size:0.98rem;line-height:1.95;color:var(--text);font-weight:300;}
.reading-body p{margin-bottom:1rem;}
.reading-body p:last-child{margin-bottom:0;}
.loading-ring{display:flex;justify-content:center;align-items:center;gap:8px;padding:1.5rem 0;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gold-dim);animation:pulse 1.4s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,80%,100%{transform:scale(0.6);opacity:0.3}40%{transform:scale(1);opacity:1}}

/* Paywall */
.paywall{background:linear-gradient(160deg,#0f0c1e,#1a1530);border:1px solid var(--gold-dim);border-radius:16px;padding:2rem 1.5rem;text-align:center;margin-top:1.5rem;}
.paywall-icon{font-size:2.5rem;margin-bottom:1rem;}
.paywall-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:0.1em;margin-bottom:0.6rem;}
.paywall-desc{font-size:0.88rem;color:var(--muted);line-height:1.7;margin-bottom:1.5rem;}
.paywall-plans{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem;}
.plan{background:var(--surface2);border:1px solid #2e2850;border-radius:12px;padding:1rem 1.2rem;min-width:140px;cursor:pointer;transition:all 0.25s;position:relative;}
.plan:hover,.plan.selected{border-color:var(--gold);background:#1e1838;}
.plan.popular::before{content:'인기';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--gold);color:#07050f;font-family:'Cinzel',serif;font-size:0.55rem;padding:2px 10px;border-radius:20px;letter-spacing:0.1em;}
.plan-name{font-family:'Cinzel',serif;font-size:0.7rem;color:var(--gold-dim);letter-spacing:0.1em;margin-bottom:0.4rem;}
.plan-price{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--text);margin-bottom:0.2rem;}
.plan-price span{font-size:0.7rem;color:var(--muted);}
.plan-desc{font-size:0.72rem;color:var(--muted);}
.pay-btn{display:inline-block;padding:13px 36px;background:linear-gradient(135deg,#4a2d8e,#6b4fb5);border:none;border-radius:10px;color:var(--gold-light);font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:0.12em;cursor:pointer;transition:opacity 0.2s;}
.pay-btn:hover{opacity:0.85;}
.paywall-note{font-size:0.72rem;color:var(--muted);margin-top:0.8rem;font-style:italic;}

.actions{display:flex;gap:10px;justify-content:center;margin-top:1.2rem;flex-wrap:wrap;}
.action-btn{background:none;border:1px solid #2e2850;border-radius:20px;padding:8px 20px;color:var(--muted);font-family:'Cinzel',serif;font-size:0.65rem;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;}
.action-btn:hover{border-color:var(--gold-dim);color:var(--text);}
.err{color:#d07050;}

/* Security badge */
.security-note{text-align:center;font-size:0.62rem;color:#3a3060;letter-spacing:0.08em;margin-top:2rem;font-family:'Cinzel',serif;}

@media(max-width:480px){h1{font-size:1.5rem;}.card{width:90px;height:150px;}.c-sym{font-size:1.8rem;}.cards-area{gap:8px;}}
</style>
</head>
<body>
<div id="stars"></div>
<div id="app">
  <div class="hdr">
    <div class="hdr-ornament">✦ ✦ ✦</div>
    <h1>별의 신탁</h1>
    <div class="hdr-sub">TAROT READING · 78 CARDS</div>
  </div>

  <!-- 서버에서 받아온 진짜 상태 표시 -->
  <div class="free-bar">
    <div class="pips" id="pips">
      <div class="pip" id="pip0"></div>
      <div class="pip" id="pip1"></div>
      <div class="pip" id="pip2"></div>
    </div>
    <div class="free-info">
      <div class="free-count" id="freeCount"><span class="status-loading">확인 중...</span></div>
      <div class="free-sub" id="freeSub">서버에서 확인 중</div>
    </div>
  </div>

  <div class="input-card">
    <label class="field-label">✦ 당신의 질문</label>
    <textarea id="q" placeholder="마음속 질문을 자유롭게 적어주세요&#10;예: 이 사람과의 관계가 발전할 수 있을까요?"></textarea>
    <span class="spread-label">✦ 스프레드</span>
    <div class="spread-row">
      <button class="sopt active" onclick="setSpread(1,this)">한 장</button>
      <button class="sopt" onclick="setSpread(3,this)">세 장 (과·현·미)</button>
      <button class="sopt" onclick="setSpread(5,this)">다섯 장 (켈틱)</button>
    </div>
    <button class="draw-btn" id="drawBtn" onclick="startReading()">✦ &nbsp;카드 뽑기&nbsp; ✦</button>
  </div>

  <div id="cardsSection" style="display:none">
    <div class="section-sep">✦ &nbsp; &nbsp; ✦ &nbsp; &nbsp; ✦</div>
    <div class="cards-area" id="cardsArea"></div>
  </div>

  <div id="readingSection" style="display:none">
    <div class="reading-wrap">
      <div class="reading-hdr">✦ &nbsp;신탁의 말씀&nbsp; ✦</div>
      <div class="reading-body" id="readingBody"></div>
    </div>
    <div class="actions">
      <button class="action-btn" onclick="resetAll()">✦ 다시 질문하기</button>
      <button class="action-btn" onclick="shareReading()">공유하기</button>
    </div>
  </div>

  <div id="paywallSection" style="display:none">
    <div class="paywall">
      <div class="paywall-icon">🌙</div>
      <div class="paywall-title">무료 리딩이 끝났습니다</div>
      <div class="paywall-desc">
        3회의 무료 신탁을 모두 사용하셨어요.<br>
        별의 목소리를 계속 듣고 싶다면, 구독을 시작해보세요.
      </div>
      <div class="paywall-plans">
        <div class="plan" id="plan-light" onclick="selectPlan('light')">
          <div class="plan-name">LIGHT</div>
          <div class="plan-price">2,900<span>원/월</span></div>
          <div class="plan-desc">월 30회 리딩</div>
        </div>
        <div class="plan popular selected" id="plan-premium" onclick="selectPlan('premium')">
          <div class="plan-name">PREMIUM</div>
          <div class="plan-price">5,900<span>원/월</span></div>
          <div class="plan-desc">무제한 리딩</div>
        </div>
      </div>
      <button class="pay-btn" onclick="handlePayment()">✦ &nbsp;구독 시작하기</button>
      <div class="paywall-note">언제든 해지 가능 · 첫 달 무료 체험</div>
    </div>
  </div>

  <div class="security-note">✦ &nbsp;서버 보안 적용됨 · 사용 횟수는 서버에서 관리됩니다&nbsp; ✦</div>
</div>

<script>
/* Stars */
(function(){const c=document.getElementById('stars');for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--o1:${0.05+Math.random()*0.2};--o2:${0.4+Math.random()*0.6};animation-delay:${Math.random()*5}s`;c.appendChild(s);}})();

/* Deck */
const SUITS=[{name:"Wands",ko:"완드",sym:"🔥",color:"#b04820"},{name:"Cups",ko:"컵",sym:"💧",color:"#2050b0"},{name:"Swords",ko:"소드",sym:"🌬",color:"#408888"},{name:"Pentacles",ko:"펜타클",sym:"🌿",color:"#306030"}];
const RANKS=["에이스","2","3","4","5","6","7","8","9","10","페이지","나이트","퀸","킹"];
const RANK_KEYS=["시작·씨앗","균형·선택","성장·협력","안정·휴식","갈등·도전","조화·선물","반영·평가","행동·변화","완성 직전","완성·달성","탐색·배움","열정·행동","성숙·직관","통솔·완성"];
const MAJOR=[{name:"The Fool",sym:"🌟",key:"시작·순수·모험"},{name:"The Magician",sym:"⚡",key:"의지·창조·실현"},{name:"High Priestess",sym:"🌙",key:"직관·신비·내면"},{name:"The Empress",sym:"🌸",key:"풍요·모성·창조"},{name:"The Emperor",sym:"🏛",key:"권위·안정·질서"},{name:"The Hierophant",sym:"🔑",key:"전통·가르침·신념"},{name:"The Lovers",sym:"💫",key:"선택·사랑·합일"},{name:"The Chariot",sym:"🎯",key:"의지·승리·통제"},{name:"Strength",sym:"🦁",key:"용기·인내·내면의 힘"},{name:"The Hermit",sym:"🕯",key:"성찰·지혜·고독"},{name:"Wheel of Fortune",sym:"☸",key:"운명·변화·순환"},{name:"Justice",sym:"⚖",key:"균형·진실·공정"},{name:"The Hanged Man",sym:"🌀",key:"희생·관점·기다림"},{name:"Death",sym:"🌑",key:"변환·끝과 시작·해방"},{name:"Temperance",sym:"🌊",key:"조화·절제·통합"},{name:"The Devil",sym:"⛓",key:"집착·욕망·그림자"},{name:"The Tower",sym:"💥",key:"급변·붕괴·각성"},{name:"The Star",sym:"⭐",key:"희망·치유·영감"},{name:"The Moon",sym:"🌕",key:"환상·불안·무의식"},{name:"The Sun",sym:"☀",key:"기쁨·성공·활력"},{name:"Judgement",sym:"📯",key:"각성·부활·소명"},{name:"The World",sym:"🌍",key:"완성·통합·성취"}];
let DECK=[];
function buildDeck(){DECK=[];MAJOR.forEach(c=>DECK.push({...c,suit:null,suitColor:'#c9a84c',isMajor:true}));SUITS.forEach(s=>RANKS.forEach((r,i)=>DECK.push({name:`${r} of ${s.name}`,sym:s.sym,key:`${s.ko} · ${RANK_KEYS[i]}`,suit:s.ko,suitColor:s.color,isMajor:false})));}
buildDeck();

const POSITIONS={1:["현재"],3:["과거","현재","미래"],5:["현재 상황","장애물","과거","미래","결과"]};
let spreadCount=1, drawnCards=[], selectedPlan='premium';

/* ── 서버에서 상태 가져오기 (조작 불가) ── */
let serverStatus = { remaining: 3, is_paid: false, free_used: 0 };

async function loadStatus() {
  try {
    const res = await fetch('/api/status');
    if (res.ok) {
      serverStatus = await res.json();
      updateStatusUI();
    }
  } catch(e) {
    // 오프라인이면 기본값 유지
    updateStatusUI();
  }
}

function updateStatusUI() {
  const { remaining, is_paid, free_used } = serverStatus;
  // Pips
  for(let i=0;i<3;i++){
    const pip=document.getElementById('pip'+i);
    pip.classList.remove('used','paid');
    if(is_paid) pip.classList.add('paid');
    else if(i < free_used) pip.classList.add('used');
  }
  // 텍스트
  const countEl = document.getElementById('freeCount');
  const subEl = document.getElementById('freeSub');
  if(is_paid){
    countEl.textContent = 'PREMIUM ✦';
    countEl.style.color = '#8b6fd5';
    subEl.textContent = '무제한 리딩';
  } else if(remaining <= 0){
    countEl.textContent = '무료 횟수 소진';
    countEl.style.color = 'var(--muted)';
    subEl.textContent = '구독 후 계속 이용하세요';
  } else {
    countEl.textContent = `무료 ${remaining}회 남음`;
    countEl.style.color = 'var(--gold)';
    subEl.textContent = '서버에서 확인된 횟수';
  }
}

loadStatus(); // 페이지 로드 시 서버에서 상태 확인

function setSpread(n,btn){spreadCount=n;document.querySelectorAll('.sopt').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function startReading(){
  const q=document.getElementById('q').value.trim();
  if(!q){document.getElementById('q').focus();return;}
  // 클라이언트는 체크 안 함 — 서버가 판단
  const shuffled=[...DECK].sort(()=>Math.random()-0.5).slice(0,spreadCount);
  drawnCards=shuffled.map(c=>({...c,rx:Math.random()<0.28}));
  renderCards();
}

function renderCards(){
  const area=document.getElementById('cardsArea');area.innerHTML='';
  const pos=POSITIONS[spreadCount]||[''];
  drawnCards.forEach((c,i)=>{
    const slot=document.createElement('div');slot.className='card-slot';
    if(pos[i]){const l=document.createElement('div');l.className='card-pos-label';l.textContent=pos[i];slot.appendChild(l);}
    const card=document.createElement('div');card.className='card';card.id='card'+i;
    card.innerHTML=`<div class="card-inner"><div class="card-back"><div class="back-inner">✦</div></div><div class="card-front"><div class="suit-stripe" style="background:${c.suitColor}"></div><div class="c-name">${c.name}${c.rx?' ▽':''}</div><div class="c-sym">${c.sym}</div><div class="c-type" style="color:${c.suitColor};opacity:0.9">${c.isMajor?'메이저 아르카나':c.suit}</div><div class="c-key">${c.key}</div>${c.rx?'<div class="c-rx">REVERSED</div>':''}</div></div>`;
    card.onclick=()=>card.classList.toggle('flipped');
    slot.appendChild(card);area.appendChild(slot);
  });
  document.getElementById('cardsSection').style.display='block';
  document.getElementById('readingSection').style.display='none';
  document.getElementById('paywallSection').style.display='none';
  document.getElementById('drawBtn').disabled=true;
  drawnCards.forEach((_,i)=>setTimeout(()=>{const c=document.getElementById('card'+i);if(c)c.classList.add('flipped');},i*380+400));
  setTimeout(()=>fetchReading(),drawnCards.length*380+700);
}

async function fetchReading(){
  document.getElementById('readingSection').style.display='block';
  document.getElementById('readingBody').innerHTML='<div class="loading-ring"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  const q=document.getElementById('q').value.trim();
  const pos=POSITIONS[spreadCount]||[''];
  try{
    const res=await fetch('/api/reading',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:q,cards:drawnCards,positions:pos})
    });
    const data=await res.json();

    if(res.status===402 && data.error==='FREE_LIMIT_REACHED'){
      // 서버가 한도 초과 알림 → 페이월 표시
      document.getElementById('readingSection').style.display='none';
      showPaywall();
      document.getElementById('drawBtn').disabled=false;
      return;
    }
    if(!res.ok) throw new Error(data.error||'서버 오류');
    if(res.status===429) throw new Error(data.error);

    document.getElementById('readingBody').innerHTML=data.reading.split('\n\n').filter(p=>p.trim()).map(p=>`<p>${p.trim()}</p>`).join('');

    // 서버에서 반환된 남은 횟수로 UI 업데이트
    if(data.remaining !== undefined){
      serverStatus.remaining = data.remaining;
      serverStatus.is_paid = data.is_paid;
      serverStatus.free_used = 3 - data.remaining;
      updateStatusUI();
    }
  }catch(e){
    document.getElementById('readingBody').innerHTML=`<p class="err">오류: ${e.message}</p>`;
  }
  document.getElementById('drawBtn').disabled=false;
}

function showPaywall(){
  document.getElementById('paywallSection').style.display='block';
  document.getElementById('cardsSection').style.display='none';
  window.scrollTo({top:document.getElementById('paywallSection').offsetTop-20,behavior:'smooth'});
}
function selectPlan(p){selectedPlan=p;document.querySelectorAll('.plan').forEach(el=>el.classList.remove('selected'));document.getElementById('plan-'+p).classList.add('selected');}
function handlePayment(){
  // 토스페이먼츠 SDK 연동 위치
  alert('[결제 연동 위치]\n토스페이먼츠 SDK를 여기에 연결하세요.\nhttps://docs.tosspayments.com');
}
function resetAll(){drawnCards=[];document.getElementById('cardsSection').style.display='none';document.getElementById('readingSection').style.display='none';document.getElementById('paywallSection').style.display='none';document.getElementById('drawBtn').disabled=false;}
function shareReading(){const t=document.getElementById('readingBody').innerText;if(navigator.share)navigator.share({title:'별의 신탁',text:t.substring(0,200)+'...',url:location.href});else navigator.clipboard.writeText(t).then(()=>alert('클립보드에 복사됐어요!'));}
</script>
